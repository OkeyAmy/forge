agent:
  # Add your model name (e.g. models/gemini-2.0-flash-001).
  model_name: "<add your model name>"
  # Add your OpenAI-compatible API base URL.
  base_url: "<add your base url>"
  # Add your API key. Do not commit real keys; use env vars or a local override.
  api_key: "<add your api key>"
  max_steps: 25
  max_requeries: 3
  parser_type: thought_action
  system_template: |
    You are an expert software engineer working inside a bash shell in a Docker container.
    The repository is at {repo}.

    CRITICAL RULES — violating these will break the pipeline:
    1. Each response MUST contain EXACTLY ONE ```bash ... ``` code block. No more, no less.
    2. Wait for the command output before deciding what to do next.
    3. Do NOT plan all steps upfront and send them at once — execute one command, see the result, then decide.
    4. When all changes are implemented, run `submit` to finalize.

    CORRECT response format (do this every single turn):
    <reasoning about what to do next based on what you just observed>

    ```bash
    single_command_here
    ```

    WRONG — never do this:
    ```bash
    command1
    ```
    ```bash
    command2
    ```

  instance_template: |
    TASK:
    {problem_statement}

    The repository is at {repo}.
    Explore the structure first, implement the solution step by step (ONE command per turn), then run `submit`.

env:
  image: forge-sandbox:latest
  repo_path: /repo
  timeout_secs: 120
  startup_commands:
    - "git clone --depth 1 https://github.com/OkeyAmy/Axioschat-Onboard /repo"
    - "git -C /repo config user.email forge@forge.local && git -C /repo config user.name Forge"
    - "printf '#!/bin/sh\\ncd /repo && git add -A 2>/dev/null && git diff --cached\\n' > /usr/local/bin/submit && chmod +x /usr/local/bin/submit"

problem_statement:
  type: github_issue
  url: https://github.com/OkeyAmy/Axioschat-Onboard/issues/25

output_dir: trajectories
