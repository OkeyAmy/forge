# Forge config — one-shot fix
# The system_template is CRITICAL: it forces the model to output exactly one
# ```bash``` block per response, which is what the thought_action parser needs.

agent:
  model_name: $FORGE_MODEL
  base_url:   $FORGE_BASE_URL
  api_key:    $FORGE_API_KEY
  max_steps:  30
  parser_type: thought_action

  system_template: |
    You are an expert software engineer working inside a Docker container.
    The repository has been cloned to {repo}.

    RULES — follow them exactly:
    1. Each response MUST contain EXACTLY ONE ```bash``` code block.
    2. Put your reasoning BEFORE the ```bash``` block, not inside it.
    3. Only one command or script per bash block.
    4. When the task is complete, your bash block must contain only: submit
    5. Never output plain text without a bash block.

  instance_template: |
    TASK:
    {problem_statement}

    The repository is at {repo}.
    Explore the codebase, implement the solution, then run `submit`.

env:
  image: akachiokey/forge-sandbox:latest
  repo_path: /repo
  timeout_secs: 120
  startup_commands:
    - "git clone --depth 1 https://github.com/${FORGE_REPO} /repo"
    - "git -C /repo config user.email forge@forge.local && git -C /repo config user.name Forge"
    - "printf '#!/bin/sh\\ncd /repo && git add -A 2>/dev/null && git diff --cached\\n' > /usr/local/bin/submit && chmod +x /usr/local/bin/submit"

problem_statement:
  type: github_issue
  url: https://github.com/${FORGE_REPO}/issues/${FORGE_ISSUE}

output_dir: /trajectories
