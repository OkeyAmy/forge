services:
  forge:
    image: akachiokey/forge:latest
    pull_policy: always
    env_file: [.env]
    environment:
      FORGE_MODEL: ${FORGE_MODEL}
      FORGE_BASE_URL: ${FORGE_BASE_URL}
      FORGE_API_KEY: ${FORGE_API_KEY}
      FORGE_REPO: ${FORGE_REPO:-OkeyAmy/Axioschat-Onboard}
      FORGE_ISSUE: ${FORGE_ISSUE:-27}
      RUST_LOG: ${RUST_LOG:-forge=warn}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../trajectories:/trajectories
      - ./forge.yaml:/config.yaml:ro
    group_add:
      - "${DOCKER_GID:-132}"
    command: [run, --config, /config.yaml]
    restart: "no"

  quick-stats:
    image: akachiokey/forge:latest
    pull_policy: always
    volumes:
      - ../trajectories:/trajectories
    command: [quick-stats, /trajectories]
    restart: "no"
